# Hyprland configuration overrides

$terminal = uwsm app -- ghostty
$browser = chromium --force-device-scale-factor=0.8

# ---------------------------------------------------------------------------
# Nvim cheatsheet — floating terminal with fzf search
# ---------------------------------------------------------------------------
windowrule = float on, match:class org.omarchy.nvim-cheatsheet
windowrule = center on, match:class org.omarchy.nvim-cheatsheet
windowrule = size 1400 880, match:class org.omarchy.nvim-cheatsheet

# ---------------------------------------------------------------------------
# Monitors
# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
# ---------------------------------------------------------------------------
monitor=DP-1,preferred,0x0,1
monitor=eDP-1,preferred,auto-right,1

workspace = 1, monitor:DP-1, default:true, persistent:true
workspace = 2, monitor:DP-1, persistent:true
workspace = 3, monitor:DP-1, persistent:true
workspace = 4, monitor:DP-1, persistent:true
workspace = 5, monitor:DP-1, persistent:true
workspace = 6, monitor:eDP-1, default:true, persistent:true
workspace = 7, monitor:eDP-1, persistent:true
workspace = 8, monitor:eDP-1, persistent:true
workspace = 9, monitor:eDP-1, persistent:true
workspace = 10, monitor:eDP-1, persistent:true

# ---------------------------------------------------------------------------
# Unbinds — clear Omarchy defaults we're replacing
# ---------------------------------------------------------------------------

# Arrow-key navigation (replaced by hjkl below)
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN
unbind = SUPER SHIFT ALT, LEFT
unbind = SUPER SHIFT ALT, RIGHT
unbind = SUPER SHIFT ALT, UP
unbind = SUPER SHIFT ALT, DOWN

# Keys being repurposed
unbind = SUPER, W        # was Close window       → moved to SUPER+Q
unbind = SUPER, J        # was Toggle split        → moved to SUPER+V
unbind = SUPER, K        # was Show keybindings   → moved to SUPER+ALT+K (resize)
unbind = SUPER, L        # was Workspace layout    → moved to SUPER+ALT+L (resize)
unbind = SUPER, h        # was unbound in Omarchy
unbind = SUPER, l        # was unbound in Omarchy
unbind = SUPER, k        # was unbound in Omarchy
unbind = SUPER, j        # was unbound in Omarchy
unbind = SUPER, F        # was Full screen         → moved to SUPER+M
unbind = SUPER, S        # was Scratchpad toggle   → leaving unbound
unbind = SUPER ALT, S    # was Move to scratchpad  → leaving unbound
unbind = SUPER, P        # was Pseudo window       → moved to SUPER+CTRL+P
unbind = SUPER SHIFT, M  # was Music (Spotify)     → leaving unbound
unbind = SUPER SHIFT ALT, M  # was Music TUI       → leaving unbound
unbind = SUPER SHIFT, N  # was Editor              → moved to SUPER+SHIFT+N (Vault)
unbind = SUPER SHIFT, RETURN  # was Browser        → moved to SUPER+SHIFT+RETURN (Editor)
unbind = SUPER SHIFT, B  # was Browser             → moved to SUPER+SHIFT+B (private)
unbind = SUPER SHIFT, E  # was Hey.com email       → moved to Gmail
unbind = SUPER SHIFT, A  # was ChatGPT             → replaced with focus-or-open
unbind = SUPER SHIFT, C  # was Hey Calendar        → replaced with Claude
unbind = SUPER, code:61  # was Cycle monitor scaling → replaced with keybindings menu

# ---------------------------------------------------------------------------
# System
# ---------------------------------------------------------------------------
bindd = SUPER, slash, Keybindings cheat sheet, exec, omarchy-menu-keybindings
bindd = SUPER CTRL, slash, Nvim cheatsheet, exec, $HOME/Omarchy-supplement/bin/nvim-cheatsheet
bindd = SUPER, R, Reload Hyprland config, exec, hyprctl reload && notify-send "Hyprland" "Config reloaded" -t 2000
bindd = SUPER, Z, Lock screen, exec, omarchy-system-lock
bindd = SUPER, X, Exit Hyprland, exec, uwsm stop
bindd = SUPER, Q, Kill active window, killactive,

# ---------------------------------------------------------------------------
# Navigation — focus
# ---------------------------------------------------------------------------
bindd = SUPER, h, Move window focus left, movefocus, l
bindd = SUPER, l, Move window focus right, movefocus, r
bindd = SUPER, k, Move window focus up, movefocus, u
bindd = SUPER, j, Move window focus down, movefocus, d
bindd = SUPER, n, Next window, cyclenext,
bindd = SUPER, p, Previous window, cyclenext, prev

# Pseudo window (dwindle) — moved off SUPER+P
bindd = SUPER CTRL, p, Pseudo window, pseudo,

# ---------------------------------------------------------------------------
# Window management
# ---------------------------------------------------------------------------
bindd = SUPER, f, Toggle window floating, togglefloating,
bindd = SUPER, v, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, m, Maximize window, fullscreen, 1
bindd = SUPER SHIFT, m, True fullscreen, fullscreen, 0

# Resize active window (Reshape)
bindd = SUPER ALT, h, Resize window left, resizeactive, -50 0
bindd = SUPER ALT, l, Resize window right, resizeactive, 50 0
bindd = SUPER ALT, k, Resize window up, resizeactive, 0 -50
bindd = SUPER ALT, j, Resize window down, resizeactive, 0 50

# ---------------------------------------------------------------------------
# Move windows
# ---------------------------------------------------------------------------
bindd = SUPER SHIFT, h, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, l, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, k, Swap window up, swapwindow, u
bindd = SUPER SHIFT, j, Swap window down, swapwindow, d

# Move workspaces between monitors
bindd = SUPER SHIFT ALT, h, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, l, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, k, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, j, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# ---------------------------------------------------------------------------
# Screenshots
# ---------------------------------------------------------------------------
bindd = SUPER, s, Screenshot a window, exec, omarchy-capture-screenshot windows
bindd = SUPER, a, Screenshot a region, exec, omarchy-capture-screenshot region

# ---------------------------------------------------------------------------
# Applications
# ---------------------------------------------------------------------------
bindd = SUPER, e, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, RETURN, Editor, exec, omarchy-launch-editor
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, B, Browser (private), exec, omarchy-launch-browser --private

# ---------------------------------------------------------------------------
# Web apps
# ---------------------------------------------------------------------------
bindd = SUPER SHIFT, E, Gmail, exec, omarchy-launch-or-focus-webapp Gmail "https://mail.google.com/"
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-or-focus-webapp ChatGPT "https://chatgpt.com"
bindd = SUPER SHIFT, C, Claude, exec, omarchy-launch-or-focus-webapp Claude "https://claude.ai"
bindd = SUPER SHIFT, K, Keyboard configurator, exec, omarchy-launch-webapp "https://configure.zsa.io/voyager/layouts/LDEn6/latest/0"
bindd = SUPER SHIFT, N, NordPass vault, exec, uwsm-app -- chromium "chrome-extension://eiaeiblijfjekdanodkjadfinkhbfgcd/app.html##/vault"
